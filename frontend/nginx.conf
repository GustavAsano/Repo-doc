server {
    listen 3000;

    root /app/dist;
    index index.html;

    # Proxy all API routes to the backend
    location ~ ^/(llm|repo|docs|export|chat|graph|health) {
        proxy_pass http://repo-doc-backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Connection '';

        # Required for SSE streaming (doc generation)
        chunked_transfer_encoding on;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 600s;
    }

    # Serve frontend SPA — fallback to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }
}
